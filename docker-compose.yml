# Single-domain production deployment: web (Caddy) serves the frontend static
# assets and proxies /api to the backend. No CORS needed (one origin).
#
# First run:
#   1) docker compose build
#   2) docker compose run --rm backend python scripts/download_kazakhtts2.py
#      (downloads models into the `models` volume, ~600 MB)
#   3) docker compose up -d
#
# Locally open http://localhost. For production set SITE_ADDRESS=<domain> in .env
# (Caddy obtains HTTPS itself).

services:
  backend:
    build: ./backend
    environment:
      MODELS_DIR: /models
      STORAGE_DIR: /storage
      CORS_ORIGINS: "" # single domain → CORS not needed
      DEFAULT_VOICE: ${DEFAULT_VOICE:-female3}
    volumes:
      - models:/models
      - storage:/storage
    expose:
      - "8000"
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: "" # relative paths → proxied to the backend
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  models:
  storage:
